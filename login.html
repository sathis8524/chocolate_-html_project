<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waffle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:flex-end;   /* Moves login box to right */
    align-items:center;
    background: linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,4)), url(img/bg1.jpeg);
}

/* Dark overlay */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    top:0;
    left:0;
}

.login-box{
    position:relative;
    /* background:rgba(255,255,255,0.95); */
    width:350px;
    padding:40px;
    margin-right:60px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
    color:#2e7d32;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    font-size:14px;
    color:whitesmoke;
}

.input-group input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

.login-btn{
    width:100%;
    padding:10px;
    border:none;
    background:#2e7d32;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#1b5e20;
}

.links{
    color: wheat;
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.links a{
    color:#2e7d32;
    text-decoration:none;
}
.links a:hover{
    text-decoration:underline;
}

/* Responsive for mobile */
@media(max-width:768px){
    body{
        justify-content:center;
    }
    .login-box{
        margin-right:0;
        width:90%;
    }
}

</style>
</head>

<body>

<div class="login-box">
    <h2>Login Bage</h2>
    <form action="products.html">
        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>
        <a href="register.html">
        <button type="submit" class="login-btn">Login</button>
        </a>

        <div class="links">
            <p><a href="#">Forgot Password?</a></p>
            <p>Don't have an account? <a href="register.html">Sign Up</a></p>
        </div>
    </form>
</div>

</body>
</html>
